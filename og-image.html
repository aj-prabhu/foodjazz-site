<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1200px;
      height: 630px;
      background: #1C1C1E;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'DM Sans', Arial, sans-serif;
    }

    .card {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      padding: 80px 100px;
      position: relative;
    }

    /* Subtle sage vignette */
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 80% 50%, rgba(122, 140, 110, 0.12) 0%, transparent 65%);
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 52px;
    }

    /* Wrapper enforces clip bounds and gives spiral breathing room */
    .logo-svg-wrap {
      width: 44px;
      height: 44px;
      flex-shrink: 0;
      overflow: hidden;
    }

    .logo-svg {
      width: 44px;
      height: 44px;
      display: block;
    }

    .logo-name {
      font-family: 'Caveat', cursive;
      font-size: 40px;
      font-weight: 700;
      color: #E8E0D5;
      letter-spacing: 0.01em;
      line-height: 1;
    }

    .headline {
      font-family: 'DM Sans', Arial, sans-serif;
      font-size: 62px;
      font-weight: 700;
      color: #E8E0D5;
      line-height: 1.1;
      max-width: 830px;
      margin-bottom: 28px;
    }

    .headline .accent { color: #7A8C6E; }

    .tagline {
      font-family: 'DM Sans', sans-serif;
      font-size: 22px;
      font-weight: 300;
      color: rgba(232, 224, 213, 0.55);
      letter-spacing: 0.02em;
    }

    .badge {
      position: absolute;
      right: 100px;
      bottom: 72px;
      background: #7A8C6E;
      color: #1C1C1E;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 400;
      padding: 9px 20px;
      border-radius: 100px;
      letter-spacing: 0.04em;
    }

    .deco-spiral {
      position: absolute;
      right: 60px;
      top: 50%;
      transform: translateY(-50%);
      width: 320px;
      height: 320px;
      opacity: 0.13;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <!-- Background decorative spiral -->
    <svg class="deco-spiral" viewBox="-10 -10 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M 78,18 C 98,36 92,70 66,82 C 40,94 12,74 10,50 C 8,26 28,8 54,12 C 76,16 88,34 78,52 C 70,68 52,74 38,62 C 26,52 28,38 40,34 C 50,31 60,36 58,46 C 56,53 48,56 42,52" stroke="#7A8C6E" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>

    <div class="logo-row">
      <div class="logo-svg-wrap">
        <svg class="logo-svg" viewBox="-10 -10 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M 78,18 C 98,36 92,70 66,82 C 40,94 12,74 10,50 C 8,26 28,8 54,12 C 76,16 88,34 78,52 C 70,68 52,74 38,62 C 26,52 28,38 40,34 C 50,31 60,36 58,46 C 56,53 48,56 42,52" stroke="#7A8C6E" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="logo-name">Food Jazz</span>
    </div>

    <h1 class="headline">Cooking takes 30 minutes.<br>Learning how takes <span class="accent">30 days.</span></h1>
    <p class="tagline">1-on-1 culinary coaching in your kitchen · Bay Area</p>

    <span class="badge">foodjazz.club/coach</span>
  </div>
</body>
</html>
