<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="vignette" cx="80%" cy="50%" r="60%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#7A8C6E" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#7A8C6E" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#1C1C1E"/>
  <rect width="1200" height="630" fill="url(#vignette)"/>

  <!-- Logo spiral (64px, scaled from 100px viewBox) -->
  <g transform="translate(100, 58) scale(0.64)">
    <path d="M 78,18 C 98,36 92,70 66,82 C 40,94 12,74 10,50 C 8,26 28,8 54,12 C 76,16 88,34 78,52 C 70,68 52,74 38,62 C 26,52 28,38 40,34 C 50,31 60,36 58,46 C 56,53 48,56 42,52"
          stroke="#7A8C6E" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- "Food Jazz" wordmark -->
  <text x="142" y="99" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="36" font-weight="700" fill="#E8E0D5" letter-spacing="0.5">Food Jazz</text>

  <!-- Headline -->
  <text x="100" y="280" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="66" font-weight="700" fill="#E8E0D5">30 days in your kitchen.</text>
  <text x="100" y="360" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="66" font-weight="700" fill="#E8E0D5">Cook without recipes, forever.</text>

  <!-- Tagline -->
  <text x="100" y="420" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="24" font-weight="300" fill="#E8E0D5" opacity="0.55" letter-spacing="1">1-on-1 culinary coaching · Bay Area</text>

  <!-- Badge pill -->
  <rect x="987" y="536" width="213" height="44" rx="22" fill="#7A8C6E"/>
  <text x="1093" y="563" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="16" font-weight="400" fill="#1C1C1E" text-anchor="middle" letter-spacing="1">foodjazz.club/coach</text>
</svg>
